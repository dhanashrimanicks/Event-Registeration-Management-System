<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Host Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="page-wrap">
    <div class="glass-card p-3 p-md-4 mb-4 d-flex justify-content-between align-items-center">
      <div>
        <h3 class="brand mb-1">Host Dashboard</h3>
        <div id="userBanner" class="small-note"></div>
      </div>
      <button class="btn btn-brand btn-sm" onclick="logout()">Logout</button>
    </div>

    <div class="row g-4">
      <div class="col-lg-6">
        <div class="glass-card p-3 p-md-4 h-100">
          <div class="section-title">Create Main Event Organiser</div>
          <form id="organiserForm" class="row g-2" autocomplete="off">
            <div class="col-12"><input id="name" class="form-control" placeholder="Name" autocomplete="off" required /></div>
            <div class="col-12"><input id="email" class="form-control" type="email" placeholder="Email" autocomplete="off" required /></div>
            <div class="col-12">
              <div class="input-group">
                <input id="password" class="form-control" type="password" placeholder="Password" autocomplete="new-password" required />
                <button
                  class="btn btn-outline-secondary password-toggle"
                  type="button"
                  data-target="password"
                  aria-label="Show password"
                >
                  Show
                </button>
              </div>
            </div>
            <div class="col-12"><button class="btn btn-teal w-100">Create Organiser</button></div>
          </form>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="glass-card p-3 p-md-4 h-100">
          <div class="section-title">All Organisers</div>
          <div id="organisersWrap"></div>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/host-dashboard.js"></script>
</body>
</html>
