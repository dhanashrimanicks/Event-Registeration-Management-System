<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="page-wrap">
    <div class="glass-card p-3 p-md-4 mb-4 d-flex justify-content-between align-items-center">
      <div>
        <h3 class="brand mb-1">User Dashboard</h3>
        <div id="userBanner" class="small-note"></div>
      </div>
      <div>
        <a class="btn btn-outline-dark btn-sm" href="team-management.html">Team Management</a>
        <button class="btn btn-brand btn-sm" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-lg-8">
        <div class="glass-card p-3 p-md-4">
          <div class="section-title">Main Event Wise Events</div>
          <div id="eventsWrap" class="events-stack"></div>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="glass-card p-3 p-md-4">
          <div class="section-title">My Registrations</div>
          <div id="myRegs"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/user-dashboard.js"></script>

</html>
