<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Management Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="page-wrap">
    <div class="glass-card p-3 p-md-4 mb-4 d-flex justify-content-between align-items-center">
      <div>
        <h3 class="brand mb-1">Management Dashboard</h3>
        <div id="userBanner" class="small-note"></div>
      </div>
      <button class="btn btn-brand btn-sm" onclick="logout()">Logout</button>
    </div>

    <div class="row g-4">
      <div class="col-lg-6">
        <div class="glass-card p-3 p-md-4">
          <div class="section-title">Create Sub-Event</div>
          <form id="eventForm" class="row g-2" autocomplete="off">
            <div class="col-12">
              <label class="small-note mb-1">Main Event</label>
              <select id="mainEvent" class="form-select" required></select>
            </div>
            <div class="col-12">
              <label class="small-note mb-1">Sub-Event Name</label>
              <input id="name" class="form-control" placeholder="Sub-event name" autocomplete="off" required />
            </div>
            <div class="col-6">
              <label class="small-note mb-1">Start Date</label>
              <input type="date" id="date" class="form-control" autocomplete="off" required />
            </div>
            <div class="col-6">
              <label class="small-note mb-1">Start Time</label>
              <input type="time" id="time" class="form-control" autocomplete="off" required />
            </div>
            <div class="col-6">
              <label class="small-note mb-1">End Date</label>
              <input type="date" id="endDate" class="form-control" autocomplete="off" required />
            </div>
            <div class="col-6">
              <label class="small-note mb-1">End Time</label>
              <input type="time" id="endTime" class="form-control" autocomplete="off" required />
            </div>
            <div class="col-6">
              <label class="small-note mb-1">Venue</label>
              <input id="venue" class="form-control" placeholder="Venue" autocomplete="off" required />
            </div>
            <div class="col-12">
              <label class="small-note mb-1">Description</label>
              <textarea id="domain" class="form-control" rows="3" placeholder="Description" autocomplete="off"></textarea>
            </div>
            <div class="col-6">
              <label class="small-note mb-1">Max Participants</label>
              <input type="number" id="maxParticipants" class="form-control" placeholder="Max participants" autocomplete="off" required />
            </div>
            <div class="col-6">
              <label class="small-note mb-1">Event Type</label>
              <select id="eventType" class="form-select"><option value="individual">individual</option><option value="team">team</option></select>
            </div>
            <div class="col-12">
              <label class="small-note mb-1">Registration Deadline</label>
              <input type="datetime-local" id="registrationDeadline" class="form-control" autocomplete="off" required />
            </div>
            <div class="col-12"><button class="btn btn-teal w-100">Create Sub-Event</button></div>
          </form>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="glass-card p-3 p-md-4">
          <div class="section-title">Sub-Events</div>
          <div id="eventsMessage" class="small-note mb-2"></div>
          <div id="eventsList" class="row g-3"></div>

          <hr class="my-4" />
          <div class="section-title">Registrations</div>
          <div id="registrationMeta" class="small-note mb-2"></div>
          <div id="registrationMessage" class="small-note mb-2"></div>
          <div id="registrationList" class="row g-2"></div>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/management-dashboard.js"></script>
</body>
</html>
