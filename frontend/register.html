<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | University Event System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="page-wrap d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="glass-card p-4 p-md-5 fade-in" style="max-width: 560px; width: 100%;">
      <h2 class="brand mb-3">Create Account</h2>
      <div id="alertBox"></div>
      <form id="registerForm" class="row g-3 mt-1" autocomplete="off">
        <div class="col-md-6">
          <label class="small-note mb-1">name:</label>
          <input class="form-control" id="name" placeholder="name" required />
        </div>
        <div class="col-md-6">
          <label class="small-note mb-1">Collage Name:</label>
          <input class="form-control" id="collegeName" placeholder="Collage Name" required />
        </div>
        <div class="col-md-6">
          <label class="small-note mb-1">Year:</label>
          <input class="form-control" id="year" placeholder="Year" />
        </div>
        <div class="col-md-6">
          <label class="small-note mb-1">Department:</label>
          <input class="form-control" id="department" placeholder="Department" />
        </div>
        <div class="col-md-6">
          <label class="small-note mb-1">Unique ID:</label>
          <input class="form-control" id="rollNo" placeholder="Unique ID" required />
        </div>
        <div class="col-md-6">
          <label class="small-note mb-1">Phone No:</label>
          <input class="form-control" id="phone" placeholder="Phone No" />
        </div>
        <div class="col-md-6">
          <label class="small-note mb-1">UserName:</label>
          <input type="email" class="form-control" id="email" placeholder="UserName" autocomplete="off" required />
        </div>
        <div class="col-md-6">
          <label class="small-note mb-1">Password:</label>
          <div class="input-group">
            <input type="password" class="form-control" id="password" placeholder="Password" autocomplete="new-password" required />
            <button
              class="btn btn-outline-secondary password-toggle"
              type="button"
              data-target="password"
              aria-label="Show password"
            >
              Show
            </button>
          </div>
        </div>
        <div class="col-12"><button class="btn btn-brand w-100" type="submit">Register</button></div>
      </form>
      <p class="mt-3 mb-0 small-note">Already registered? <a href="login.html">Login</a></p>
    </div>
  </div>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/register.js"></script>
</body>
</html>
