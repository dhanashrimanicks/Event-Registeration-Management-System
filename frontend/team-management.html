<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="page-wrap">
    <div class="glass-card p-3 p-md-4 mb-4 d-flex justify-content-between align-items-center">
      <div>
        <h3 class="brand mb-1">Team Management</h3>
        <div id="userBanner" class="small-note"></div>
      </div>
      <div>
        <a href="user-dashboard.html" class="btn btn-outline-dark btn-sm">Back</a>
        <button class="btn btn-brand btn-sm" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-lg-5">
        <div class="glass-card p-3 p-md-4 mb-3">
          <div class="section-title">Create Team</div>
          <form id="teamForm" class="row g-2">
            <div class="col-12"><input id="teamName" class="form-control" placeholder="Team name" required /></div>
            <div class="col-12"><select id="eventId" class="form-select" required></select></div>
            <div class="col-12"><button class="btn btn-teal w-100">Create Team</button></div>
          </form>
        </div>

        <div class="glass-card p-3 p-md-4">
          <div class="section-title">Add / Remove Member</div>
          <form id="addMemberForm" class="row g-2 mb-3">
            <div class="col-12"><select id="teamId" class="form-select" required></select></div>
            <div class="col-12"><input id="userId" class="form-control" placeholder="Member User ID" required /></div>
            <div class="col-6"><button class="btn btn-brand w-100" type="submit">Add</button></div>
            <div class="col-6"><button class="btn btn-outline-danger w-100" id="removeBtn" type="button">Remove</button></div>
          </form>
          <div class="small-note">Use exact user id from DB/admin records for member assignment.</div>
        </div>
      </div>
      <div class="col-lg-7">
        <div class="glass-card p-3 p-md-4">
          <div class="section-title">My Teams</div>
          <div id="teamsWrap"></div>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/team-management.js"></script>
</body>
</html>
