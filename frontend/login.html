<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | University Event System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="page-wrap d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="glass-card p-4 p-md-5 fade-in" style="max-width: 440px; width: 100%;">
      <h2 class="brand mb-3">University Event Registration</h2>
      <p class="small-note">Login to manage events, teams, and registrations.</p>
      <div id="alertBox"></div>
      <form id="loginForm" class="mt-3" autocomplete="off">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-control" autocomplete="off" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <input type="password" id="password" class="form-control" autocomplete="new-password" required />
            <button
              class="btn btn-outline-secondary password-toggle"
              type="button"
              data-target="password"
              aria-label="Show password"
            >
              Show
            </button>
          </div>
        </div>
        <button class="btn btn-brand w-100" type="submit">Login</button>
      </form>
      <p class="mt-3 mb-0 small-note">No account? <a href="register.html">Create one</a></p>
    </div>
  </div>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
